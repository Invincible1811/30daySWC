  <rect x="192" y="126" width="128" height="28" rx="14" fill="url(#cross)"/>
  <!-- Flame / heart shape at base of cross -->
  <path d="M256 310 C256 310 216 340 216 370 C216 396 234 410 256 410 C278 410 296 396 296 370 C296 340 256 310 256 310Z" fill="url(#flame)" opacity="0.9"/>
  <!-- WS initials -->
  <text x="256" y="480" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="56" fill="white" text-anchor="middle" letter-spacing="6" opacity="0.85">WINNING</text>
